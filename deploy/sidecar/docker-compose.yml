# Throttle-Gate as a sidecar (M8).
#
# Runs the rate-limiter engine + dashboard next to your own service, sharing a
# Redis. Your app calls the gate per request (here via the FastAPI middleware
# adapter); every decision shows up live in the dashboard.
#
#   docker compose -f deploy/sidecar/docker-compose.yml up --build
#
#   dashboard:  http://localhost:5173   (switch to "Live traffic")
#   your app:   http://localhost:9000/hello
#
#   # drive some traffic and watch it throttle:
#   for i in $(seq 1 40); do curl -s -o /dev/null -w "%{http_code} " \
#       -H 'x-api-key: user-42' localhost:9000/hello; done

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # The Throttle-Gate engine: /v1/check + /v1/authcheck + dashboard API + SSE.
  throttle-gate:
    build: ../../backend
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  # The dashboard (optional but recommended — this is how you watch live traffic).
  dashboard:
    build: ../../frontend
    environment:
      VITE_API_TARGET: http://throttle-gate:8000
    ports:
      - "5173:5173"
    depends_on:
      - throttle-gate

  # Your service, rate-limited via the FastAPI middleware adapter. Swap this for
  # your own app + adapter (Express, nginx, …).
  app:
    build:
      context: ../..
      dockerfile: deploy/sidecar/app.Dockerfile
    environment:
      GATE_URL: http://throttle-gate:8000/v1/check
    ports:
      - "9000:9000"
    depends_on:
      - throttle-gate
