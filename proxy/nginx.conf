events {}

http {
    # Round-robin across the two backend replicas.
    upstream backends {
        server backend-1:8000;
        server backend-2:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backends;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # SSE needs unbuffered, long-lived connections.
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }
    }
}
