# Throttle-Gate nginx adapter (M8) — rate-limit via `auth_request`.
#
# nginx issues an internal auth subrequest to Throttle-Gate's GET /v1/authcheck
# before proxying to your upstream. That endpoint returns 204 (allow) or 403
# (throttle) — the only deny status `auth_request` understands — and we map the
# 403 back to a real 429 (with Throttle-Gate's headers) for the client.
#
# Every checked request also streams into the Throttle-Gate dashboard (Live mode).
#
# Assumes Throttle-Gate's backend is reachable as http://throttle-gate:8000
# (e.g. the service name in docker-compose). Adjust `upstream` blocks to taste.

upstream throttle_gate {
    server throttle-gate:8000;
}

upstream app_backend {
    server app:9000;            # <-- your protected service
}

server {
    listen 80;

    location / {
        # Run the rate-limit check first.
        auth_request /_ratelimit;

        # Surface Throttle-Gate's headers to the client on allowed requests.
        auth_request_set $rl_limit     $upstream_http_x_ratelimit_limit;
        auth_request_set $rl_remaining $upstream_http_x_ratelimit_remaining;
        add_header X-RateLimit-Limit     $rl_limit;
        add_header X-RateLimit-Remaining $rl_remaining;

        proxy_pass http://app_backend;
    }

    # Internal subrequest → Throttle-Gate. Identify the client by API key,
    # falling back to the caller's IP; pass the original URI as the route.
    location = /_ratelimit {
        internal;
        proxy_pass http://throttle_gate/v1/authcheck;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-RateLimit-Key $http_x_api_key;   # or $remote_addr
        proxy_set_header X-Original-URI  $request_uri;
    }

    # auth_request returns 403 on throttle; turn that into a real 429 + headers.
    error_page 401 403 = @rate_limited;
    location @rate_limited {
        auth_request_set $rl_retry     $upstream_http_retry_after;
        auth_request_set $rl_limit     $upstream_http_x_ratelimit_limit;
        auth_request_set $rl_remaining $upstream_http_x_ratelimit_remaining;
        add_header Retry-After           $rl_retry        always;
        add_header X-RateLimit-Limit     $rl_limit        always;
        add_header X-RateLimit-Remaining $rl_remaining    always;
        return 429;
    }
}
