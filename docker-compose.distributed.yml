# Distributed demo (PRD §10): two real backend replicas behind an nginx proxy,
# round-robining requests. Shared Redis means the global limit holds; the
# /api/gate endpoint's `local` mode namespaces state per replica (worker_id) to
# demonstrate the unshared-state breach across real processes.
#
#   docker compose -f docker-compose.distributed.yml up --build
#   python scripts/distributed_demo.py     # load-test through the proxy
services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-1:
    build: ./backend
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  backend-2:
    build: ./backend
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  proxy:
    image: nginx:alpine
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend-1
      - backend-2

  frontend:
    build: ./frontend
    environment:
      VITE_API_TARGET: http://proxy:80
    ports:
      - "5173:5173"
    depends_on:
      - proxy
